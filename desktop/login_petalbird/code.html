<style>
        body {
            background-color: #f9f9f9;
            /* Ambient radial blur for Level 0 Background */
            background-image: radial-gradient(circle at 15% 50%, rgba(0, 122, 255, 0.05), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(0, 198, 255, 0.05), transparent 25%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(0, 122, 255, 0.08);
        }
    </style>

<body class="font-body-lg text-body-lg text-on-surface min-h-screen flex items-center justify-center p-container-padding relative overflow-hidden">
<!-- Decorative blurred shapes in background -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-accent-gradient-start rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-blob"></div>
<div class="absolute top-[20%] right-[-10%] w-[35%] h-[35%] bg-accent-gradient-end rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-blob animation-delay-2000"></div>
<div class="absolute bottom-[-20%] left-[20%] w-[40%] h-[40%] bg-primary-container rounded-full mix-blend-multiply filter blur-[100px] opacity-10 animate-blob animation-delay-4000"></div>
<main class="w-full max-w-[1000px] mx-auto z-10 flex flex-col md:flex-row glass-card rounded-[24px] overflow-hidden">
<!-- Left Side: Imagery & Branding -->
<div class="w-full md:w-1/2 relative min-h-[300px] md:min-h-[600px] hidden md:block" data-alt="A sophisticated, high-key photograph of a sleek, modern architectural space with glass elements and subtle geometric lines. Soft, diffused natural light illuminates the scene, creating a bright, optimistic, and premium atmosphere. The overall palette is neutral with soft whites and very subtle, airy blue undertones, perfectly complementing a premium digital aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDfhiSssjAvnINXhRpDGn7E5sOrCksK8LP80QOIjS18XLD018_TeYJpjvqcysM-Upbr1HdwQ7Kqfmxl857sjlkUK-NbRhnPfCsvij0Y8jj7CQEeTqby6zpMBHY2Je1VzZnyZFfabMhk2zAe6FiUfHXoX6r7F2JRVmS_rsp4XxuTt7AE3WEJtAAiVlJcCA22ozt3YwwAY4_k1tL8QnUvEwy-uPtd49lSfxnudKZ9JPBG0uBTqWjHgSOIMR-TEuihc15QqfkT32Jh8Uk'); background-size: cover; background-position: center;">
<!-- Gradient Overlay for legibility and brand tone -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-primary/20 to-transparent"></div>
<div class="absolute bottom-0 left-0 p-8 text-on-primary w-full">
<h1 class="font-display-lg text-display-lg mb-2 text-white drop-shadow-md">PetalBird</h1>
<p class="font-title-md text-title-md text-white/90 max-w-sm drop-shadow-sm">Premium Social Discovery.</p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center bg-surface-lowest">
<div class="mb-8 md:hidden">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold bg-clip-text text-transparent bg-gradient-to-r from-accent-gradient-start to-accent-gradient-end text-center">PetalBird</h1>
</div>
<div class="mb-8">
<h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Welcome back</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div>
<label class="block font-title-md text-title-md text-on-surface mb-2" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute inset-y-0 left-0 pl-3 flex items-center text-outline pointer-events-none">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-glass-border rounded-full font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary transition-shadow outline-none" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-title-md text-title-md text-on-surface mb-2" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute inset-y-0 left-0 pl-3 flex items-center text-outline pointer-events-none">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-low border border-glass-border rounded-full font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary transition-shadow outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline text-primary focus:ring-primary bg-surface-container-low" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                            Remember for 30 days
                        </label>
</div>
<div class="font-body-sm text-body-sm">
<a class="font-semibold text-primary hover:text-accent-gradient-end transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-3 px-4 bg-gradient-to-r from-accent-gradient-start to-accent-gradient-end hover:opacity-90 text-on-primary font-title-md text-title-md rounded-full shadow-[0_8px_32px_0_rgba(0,122,255,0.2)] hover:-translate-y-0.5 transition-all duration-200" type="submit">
                    Sign in
                </button>
</form>
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-lowest text-on-surface-variant font-body-sm text-body-sm">Or continue with</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="w-full inline-flex justify-center items-center py-2.5 px-4 bg-surface-container-lowest border border-glass-border rounded-xl shadow-sm text-on-surface hover:bg-surface-container-low transition-colors font-body-sm text-body-sm" type="button">
<svg aria-hidden="true" class="w-5 h-5 mr-2" fill="currentColor" viewbox="0 0 18 19" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M8.842 18.083a8.8 8.8 0 0 1-8.65-8.948 8.841 8.841 0 0 1 8.8-8.652h.153a8.464 8.464 0 0 1 5.7 2.257l-2.193 2.038A5.27 5.27 0 0 0 9.09 3.4a5.882 5.882 0 0 0-.2 11.76h.124a5.091 5.091 0 0 0 5.248-4.057L14.3 11H9V8h8.34c.066.543.095 1.09.088 1.636-.086 5.053-3.463 8.449-8.4 8.449l-.186-.002Z" fill-rule="evenodd"></path>
</svg>
                        Google
                    </button>
<button class="w-full inline-flex justify-center items-center py-2.5 px-4 bg-surface-container-lowest border border-glass-border rounded-xl shadow-sm text-on-surface hover:bg-surface-container-low transition-colors font-body-sm text-body-sm" type="button">
<svg aria-hidden="true" class="w-5 h-5 mr-2" fill="currentColor" viewbox="0 0 14 19" xmlns="http://www.w3.org/2000/svg">
<path d="M12.443 14.195c-.496.965-1.125 1.942-1.895 2.875C9.645 18.156 8.528 19 7.202 19c-1.306 0-2.316-.763-3.155-1.442-.644-.52-1.21-.977-1.871-.977-.66 0-1.226.458-1.87.978C-.158 17.929-1 18.826-1 18.826c-.77.933-1.4 1.91-1.896 2.875-.724 1.408-1.545 3.518-1.545 5.875 0 2.213.628 4.218 1.83 5.839 1.112 1.5 2.508 2.378 4.12 2.378 1.168 0 2.062-.51 2.91-1.02.66-.396 1.304-.783 2.106-.783s1.446.387 2.106.783c.849.51 1.743 1.02 2.91 1.02 1.611 0 3.008-.878 4.12-2.378 1.202-1.621 1.83-3.626 1.83-5.839 0-2.357-.821-4.467-1.545-5.875ZM6.59 13.916c.15-.05.31-.077.47-.077 1.572 0 3.018 1.157 3.324 2.766a3.543 3.543 0 0 1-.03 1.572c-.172.63-.526 1.22-.999 1.68-.475.46-.995.776-1.503.951a3.447 3.447 0 0 1-1.11.169c-.16 0-.32-.016-.48-.048-1.517-.3-2.614-1.65-2.812-3.14-.029-.214-.043-.43-.043-.645 0-.616.177-1.218.514-1.744.336-.525.807-.954 1.356-1.233.43-.222.9-.333 1.314-.252Z"></path>
</svg>
                        Apple
                    </button>
</div>
</div>
<p class="mt-8 text-center font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? <a class="font-semibold text-primary hover:text-accent-gradient-end transition-colors" href="#">Sign up</a>
</p>
</div>
</main>
<style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 7s infinite;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>
</body></html>
