<script>
        // Micro-interactions for inputs
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#0058bc';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#717786';
            });
        });

        // Simple floating animation logic for background orbs
        const orbs = document.querySelectorAll('.floating-orb');
        let tick = 0;
        function animate() {
            tick += 0.01;
            orbs.forEach((orb, i) => {
                const offset = i * 100;
                const x = Math.sin(tick + offset) * 20;
                const y = Math.cos(tick + offset) * 20;
                orb.style.transform = `translate(${x}px, ${y}px)`;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
